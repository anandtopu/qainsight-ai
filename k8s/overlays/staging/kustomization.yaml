apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: qainsight-staging

patches:
  # Keep staging closer to production while controlling costs.
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: qainsight-backend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: qainsight-frontend

  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: qainsight-config
      data:
        APP_ENV: "staging"
        LOG_LEVEL: "INFO"
        AI_OFFLINE_MODE: "false"
        CORS_ORIGINS: "https://qainsight-staging.yourdomain.com"
    target:
      kind: ConfigMap
      name: qainsight-config

images:
  - name: qainsight/backend
    newTag: staging-latest
  - name: qainsight/frontend
    newTag: staging-latest
  - name: qainsight/mcp
    newTag: staging-latest

