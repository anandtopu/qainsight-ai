apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: qainsight-staging

patches:
  # ── Replica overrides ────────────────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: qainsight-backend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: qainsight-frontend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-critical

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-ingestion

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-ai

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-default

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-beat

  # ── HPA caps — tighter in staging to control costs ───────────────────────
  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-backend-hpa

  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-frontend-hpa

  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-worker-critical-hpa

  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-worker-ingestion-hpa

  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-worker-ai-hpa

  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-worker-default-hpa

  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-mcp-hpa

  # ── Environment configuration ─────────────────────────────────────────────
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: qainsight-config
      data:
        APP_ENV: "staging"
        LOG_LEVEL: "INFO"
        AI_OFFLINE_MODE: "false"
        CORS_ORIGINS: "https://qainsight-staging.yourdomain.com"
    target:
      kind: ConfigMap
      name: qainsight-config

images:
  - name: qainsight/backend
    newTag: staging-latest
  - name: qainsight/frontend
    newTag: staging-latest
  - name: qainsight/mcp
    newTag: staging-latest
