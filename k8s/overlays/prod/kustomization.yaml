apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  # worker-hpa.yaml is removed — all HPAs now live in k8s/base/hpa.yaml

namespace: qainsight-ai

patches:
  # ── Environment configuration ─────────────────────────────────────────────
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: qainsight-config
      data:
        APP_ENV: "production"
        LOG_LEVEL: "INFO"
        AI_OFFLINE_MODE: "true"
        CORS_ORIGINS: "https://qainsight.yourdomain.com"
    target:
      kind: ConfigMap
      name: qainsight-config

  # ── Worker replica floors (HPAs handle the ceiling) ──────────────────────
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: qainsight-worker-critical

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: qainsight-worker-ingestion

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: qainsight-worker-ai

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-default

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-beat

  # ── Raise HPA ceilings for production workload ────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 8
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-backend-hpa

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 8
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-worker-ingestion-hpa

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-worker-ai-hpa

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6
    target:
      kind: HorizontalPodAutoscaler
      name: qainsight-worker-critical-hpa

images:
  - name: qainsight/backend
    newTag: "0.0.1"
  - name: qainsight/frontend
    newTag: "0.0.1"
  - name: qainsight/mcp
    newTag: "0.0.1"
