apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - worker-hpa.yaml

namespace: qainsight-ai

patches:
  # Override ConfigMap values for production environment
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: qainsight-config
      data:
        APP_ENV: "production"
        LOG_LEVEL: "INFO"
        AI_OFFLINE_MODE: "true"
        CORS_ORIGINS: "https://qainsight.yourdomain.com"
    target:
      kind: ConfigMap
      name: qainsight-config

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: qainsight-worker

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-beat

images:
  - name: qainsight/backend
    newTag: "3.0.0"
  - name: qainsight/frontend
    newTag: "3.0.0"
  - name: qainsight/mcp
    newTag: "3.0.0"
