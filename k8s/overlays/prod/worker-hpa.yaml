apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-worker-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

