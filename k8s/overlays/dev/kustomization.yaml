apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: qainsight-dev

patches:
  # Scale backend to 1 replica in dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-backend

  # Scale frontend to 1 replica in dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-frontend

  # Keep async footprint small in dev.
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      kind: Deployment
      name: qainsight-beat

  # Override ConfigMap values for dev environment
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: qainsight-config
      data:
        APP_ENV: "development"
        LOG_LEVEL: "DEBUG"
        CORS_ORIGINS: "http://localhost:3000,https://qainsight-dev.yourdomain.com"
    target:
      kind: ConfigMap
      name: qainsight-config

images:
  - name: qainsight/backend
    newTag: dev-latest
  - name: qainsight/frontend
    newTag: dev-latest
  - name: qainsight/mcp
    newTag: dev-latest
