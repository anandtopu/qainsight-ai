apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: qainsight-dev

patches:
  # ── Replica overrides — keep dev footprint small ─────────────────────────
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-backend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-frontend

  # In dev, a single worker-critical handles all queue traffic to reduce resource use.
  # Other queues are set to 0; tasks will queue in Redis until staging/prod.
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-critical

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-ingestion

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-ai

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: qainsight-worker-default

  # Beat is disabled in dev — tasks are triggered manually
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      kind: Deployment
      name: qainsight-beat

  # ── Disable HPAs in dev — fixed replica counts are sufficient ────────────
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler

  # ── Environment configuration ─────────────────────────────────────────────
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: qainsight-config
      data:
        APP_ENV: "development"
        LOG_LEVEL: "DEBUG"
        CORS_ORIGINS: "http://localhost:3000,https://qainsight-dev.yourdomain.com"
    target:
      kind: ConfigMap
      name: qainsight-config

images:
  - name: qainsight/backend
    newTag: dev-latest
  - name: qainsight/frontend
    newTag: dev-latest
  - name: qainsight/mcp
    newTag: dev-latest
