apiVersion: v1
kind: ServiceAccount
metadata:
  name: qainsight-sa
  namespace: qainsight-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qainsight-pod-reader
  namespace: qa-testing     # The namespace where test pods run
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qainsight-pod-reader-binding
  namespace: qa-testing
subjects:
  - kind: ServiceAccount
    name: qainsight-sa
    namespace: qainsight-ai
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: qainsight-pod-reader
