# ── PodDisruptionBudgets ──────────────────────────────────────────────────────
#
# Prevent Kubernetes from evicting all pods of a service simultaneously
# during voluntary disruptions (node drain, rolling cluster upgrades).
#
# Rules of thumb used here:
#  - Traffic-facing services (backend, frontend):
#      minAvailable: 1 — at least one pod must always be running.
#  - Stateless workers: minAvailable: 1 except default-queue where best-effort is fine.
#  - Beat scheduler: no PDB — Recreate strategy already handles single-replica safety.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qainsight-backend-pdb
  namespace: qainsight-ai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: qainsight-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qainsight-frontend-pdb
  namespace: qainsight-ai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: qainsight-frontend
---
# Critical worker handles real-time user-facing analysis — keep at least one alive
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qainsight-worker-critical-pdb
  namespace: qainsight-ai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: qainsight-worker-critical
---
# Ingestion and AI workers can tolerate brief unavailability (Celery will requeue)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qainsight-worker-ingestion-pdb
  namespace: qainsight-ai
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: qainsight-worker-ingestion
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qainsight-worker-ai-pdb
  namespace: qainsight-ai
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: qainsight-worker-ai
