apiVersion: v1
kind: Service
metadata:
  name: qainsight-backend
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-frontend
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-ollama
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-ollama
  ports:
    - name: ollama
      port: 11434
      targetPort: 11434
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-postgres
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-mongo
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-redis
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-minio
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-chromadb
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-chromadb
  ports:
    - port: 8001
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qainsight-mcp
  namespace: qainsight-ai
spec:
  selector:
    app: qainsight-mcp
  ports:
