# ── Horizontal Pod Autoscalers ────────────────────────────────────────────────
#
# All HPAs live here so replica counts are managed in one place.
# Overlays can patch minReplicas / maxReplicas / thresholds per environment.
#
# Scale-down behaviour is intentionally conservative for the AI worker
# because LangGraph pipelines run for up to 31 minutes — evicting a pod
# mid-run would fail the task and waste LLM credits.
# ─────────────────────────────────────────────────────────────────────────────

# ── Backend API ───────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-backend-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Replicas
          value: 1
          periodSeconds: 60
---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-frontend-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-frontend
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180
---
# ── Worker: critical queue (real-time LLM analysis) ──────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-worker-critical-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-worker-critical
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60       # scale earlier — latency-sensitive
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15   # fast scale-up for real-time tasks
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300  # hold capacity during burst windows
      policies:
        - type: Replicas
          value: 1
          periodSeconds: 120
---
# ── Worker: ingestion queue (MinIO → DB parsing) ─────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-worker-ingestion-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-worker-ingestion
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Replicas
          value: 1
          periodSeconds: 120
---
# ── Worker: AI analysis queue (multi-agent LangGraph pipelines) ───────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-worker-ai-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-worker-ai
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60       # scale early — LLM+embeddings are CPU-heavy
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      # Keep capacity for 10 minutes after load drops — pipelines run up to 31 min;
      # premature scale-down would terminate in-flight tasks.
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
---
# ── Worker: default queue (notifications, housekeeping) ──────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-worker-default-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-worker-default
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 180
---
# ── MCP Server ────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-mcp-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-mcp
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180
