apiVersion: v1
kind: ConfigMap
metadata:
  name: qainsight-config
  namespace: qainsight-ai
data:
  APP_ENV: "production"
  APP_VERSION: "3.0.0"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  POSTGRES_HOST: "qainsight-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "qainsight"
  POSTGRES_USER: "qainsight_user"
  MONGO_HOST: "qainsight-mongo"
  MONGO_PORT: "27017"
  MONGO_DB: "qainsight_logs"
  REDIS_HOST: "qainsight-redis"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "qainsight-minio:9000"
  MINIO_BUCKET_NAME: "test-telemetry"
  MINIO_USE_SSL: "false"
  OLLAMA_BASE_URL: "http://qainsight-ollama:11434"
  CHROMA_HOST: "qainsight-chromadb"
  CHROMA_PORT: "8001"
  LLM_PROVIDER: "ollama"
  LLM_MODEL: "qwen2.5:7b"
  AI_OFFLINE_MODE: "true"
  AI_CONFIDENCE_THRESHOLD: "80"
  CELERY_WORKER_CONCURRENCY: "4"
  CORS_ORIGINS: "https://qainsight.yourdomain.com"
