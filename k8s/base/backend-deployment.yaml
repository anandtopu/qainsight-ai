apiVersion: apps/v1
kind: Deployment
metadata:
  name: qainsight-backend
  namespace: qainsight-ai
  labels:
    app: qainsight-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qainsight-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: qainsight-backend
    spec:
      serviceAccountName: qainsight-sa
      containers:
        - name: backend
          image: qainsight/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: qainsight-config
            - secretRef:
                name: qainsight-secrets
          env:
            - name: APP_ENV
              value: "production"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qainsight-backend-hpa
  namespace: qainsight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qainsight-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
