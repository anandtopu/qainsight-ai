apiVersion: apps/v1
kind: Deployment
metadata:
  name: qainsight-frontend
  namespace: qainsight-ai
  labels:
    app: qainsight-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qainsight-frontend
  template:
    metadata:
      labels:
        app: qainsight-frontend
    spec:
      containers:
        - name: frontend
          image: qainsight/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
