steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/mcp:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/mcp:latest'
      - './mcp'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/mcp'

substitutions:
  _REGION: us-central1
  _PROJECT_ID: your-project-id
  _REPO: qainsight

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/mcp:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/mcp:latest'
